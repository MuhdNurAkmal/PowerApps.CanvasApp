ComponentDefinitions:
  CARD:
    DefinitionType: CanvasComponent
    CustomProperties:
      CardBgColor:
        PropertyKind: Input
        DisplayName: Card-BgColor
        Description: A custom property
        DataType: Color
        Default: =RGBA(0, 0, 0, 0)
      StatusColor:
        PropertyKind: Input
        DisplayName: Status-Color
        Description: A custom property
        DataType: Color
        Default: =RGBA(0, 0, 0, 1)
      StatusCount:
        PropertyKind: Input
        DisplayName: Status-Count
        Description: A custom property
        DataType: Text
        Default: ="Text"
      StatusCountColor:
        PropertyKind: Input
        DisplayName: Status-Count-Color
        Description: A custom property
        DataType: Color
        Default: =RGBA(0, 0, 0, 1)
      StatusName:
        PropertyKind: Input
        DisplayName: Status-Name
        Description: A custom property
        DataType: Text
        Default: ="Text"
    Children:
      - Card-Style:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            DropShadow: =DropShadow.None
            Fill: =CARD.CardBgColor
            Height: =Parent.Height
            LayoutDirection: =LayoutDirection.Vertical
            PaddingBottom: =20
            PaddingLeft: =20
            PaddingRight: =20
            PaddingTop: =20
            RadiusBottomLeft: =25
            RadiusBottomRight: =25
            RadiusTopLeft: =25
            RadiusTopRight: =25
            Width: =Parent.Width
          Children:
            - Status:
                Control: Text@0.0.51
                Properties:
                  Align: ='TextCanvas.Align'.Start
                  AutoHeight: =true
                  BorderStyle: =BorderStyle.None
                  BorderThickness: =0
                  Font: =Font.Lato
                  FontColor: =CARD.StatusColor
                  Height: =Parent.Height
                  LayoutMaxHeight: =
                  LayoutMaxWidth: =
                  Size: =26
                  Text: =CARD.StatusName
                  VerticalAlign: =
                  Width: =0
            - Status-Count:
                Control: Text@0.0.51
                Properties:
                  AutoHeight: =true
                  BorderStyle: =BorderStyle.None
                  BorderThickness: =0
                  Font: =Font.'Lato Black'
                  FontColor: =CARD.StatusCountColor
                  LayoutMaxHeight: =
                  LayoutMaxWidth: =
                  Size: =50
                  Text: =CARD.StatusCount
                  Weight: ='TextCanvas.Weight'.Bold
