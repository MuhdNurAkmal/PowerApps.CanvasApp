ComponentDefinitions:
  SVG_ICON:
    DefinitionType: CanvasComponent
    CustomProperties:
      IconColor:
        PropertyKind: Input
        DisplayName: IconColor
        Description: A custom property
        DataType: Text
        Default: ="Text"
      IconName:
        PropertyKind: Input
        DisplayName: IconName
        Description: A custom property
        DataType: Text
        Default: ="Text"
    Children:
      - SVG_1:
          Control: Image@2.2.3
          Properties:
            BorderColor: =RGBA(0, 0, 0, 1)
            Height: =Parent.Height
            Image: |-
              ="data:image/svg+xml;utf8," & Substitute(
                  EncodeUrl(SVG_ICON.IconName),
                  "%7Bcolor%7D",
                  SVG_ICON.IconColor
              )
            Width: =Parent.Width
