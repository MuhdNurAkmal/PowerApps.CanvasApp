ComponentDefinitions:
  TITLE:
    DefinitionType: CanvasComponent
    CustomProperties:
      Title:
        PropertyKind: Input
        DisplayName: Custom property 1
        Description: A custom property
        DataType: Text
        Default: ="Text"
    Properties:
      Height: =80
      Width: =If(App.Width < 640, App.Width, App.Width * 0.4)
    Children:
      - Container23:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            BorderStyle: =BorderStyle.None
            DropShadow: =DropShadow.None
            Height: =75
            Width: =TITLE.Width
          Children:
            - Rectangle10:
                Control: Rectangle@2.3.0
                Properties:
                  BorderColor: =RGBA(255, 0, 0, 1)
                  Fill: =RGBA(255, 0, 0, 1)
                  Height: =6
                  X: =15
                  Y: =52
            - Triangle1:
                Control: Triangle@2.3.0
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Fill: =RGBA(255, 255, 255, 1)
                  Height: =22
                  Width: =30
                  X: =148
                  Y: =44
            - Text4:
                Control: ModernText@1.0.0
                Properties:
                  AutoHeight: =true
                  Color: =RGBA(52, 31, 151, 1)
                  Font: =Font.'Lato Black'
                  Height: =37
                  Size: =25
                  Text: =TITLE.Title
                  Width: =522
                  X: =15
                  Y: =12
