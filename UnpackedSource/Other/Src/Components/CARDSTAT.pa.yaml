ComponentDefinitions:
  CARDSTAT:
    DefinitionType: CanvasComponent
    CustomProperties:
      BgColor:
        PropertyKind: Input
        DisplayName: BgColor
        Description: A custom property
        DataType: Color
        Default: =RGBA(255, 255, 10, 10)
      Count:
        PropertyKind: Input
        DisplayName: Count
        Description: A custom property
        DataType: Text
        Default: ="Text"
      CountColor:
        PropertyKind: Input
        DisplayName: CountColor
        Description: A custom property
        DataType: Color
        Default: =RGBA(0, 0, 0, 1)
      IconColor:
        PropertyKind: Input
        DisplayName: IconColor
        Description: A custom property
        DataType: Text
        Default: ="Text"
      IconName:
        PropertyKind: Input
        DisplayName: IconName
        Description: A custom property
        DataType: Text
        Default: ="Text"
      Title:
        PropertyKind: Input
        DisplayName: Title
        Description: A custom property
        DataType: Text
        Default: ="Text"
      TitleColor:
        PropertyKind: Input
        DisplayName: TitleColor
        Description: A custom property
        DataType: Color
        Default: =RGBA(0, 0, 0, 1)
    Properties:
      Height: =140
      Width: =600
    Children:
      - card:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            Fill: =CARDSTAT.BgColor
            Height: =140
            RadiusBottomLeft: =25
            RadiusBottomRight: =25
            RadiusTopLeft: =25
            RadiusTopRight: =25
            Width: =Parent.Width
          Children:
            - Container11:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  Height: =120
                  LayoutDirection: =LayoutDirection.Horizontal
                  X: =10
                  Y: =10
                Children:
                  - Container12:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinWidth: =30
                        Width: =100
                      Children:
                        - SVG:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 1)
                              Height: =78
                              Image: |-
                                ="data:image/svg+xml;utf8," & Substitute(
                                    EncodeUrl(CARDSTAT.IconName),
                                    "%7Bcolor%7D",
                                    CARDSTAT.IconColor
                                )
                              Width: =73
                              X: =15
                              Y: =21
                  - Container10:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        X: =40
                        Y: =40
                      Children:
                        - Container13:
                            Control: GroupContainer@1.5.0
                            Variant: ManualLayout
                            Properties:
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
                            Children:
                              - Count:
                                  Control: Text@0.0.51
                                  Properties:
                                    AutoHeight: =true
                                    Font: =Font.'Segoe UI'
                                    FontColor: =CARDSTAT.CountColor
                                    Height: =90
                                    Size: =60
                                    Text: =CARDSTAT.Count
                                    Weight: ='TextCanvas.Weight'.Bold
                                    Width: =300
                                    X: =12
                                    Y: =24
                              - Titile:
                                  Control: Text@0.0.51
                                  Properties:
                                    Font: =Font.Lato
                                    FontColor: =CARDSTAT.TitleColor
                                    Height: =30
                                    Size: =20
                                    Text: =CARDSTAT.Title
                                    Weight: ='TextCanvas.Weight'.Semibold
                                    Width: =227
                                    X: =12
                                    Y: =10
