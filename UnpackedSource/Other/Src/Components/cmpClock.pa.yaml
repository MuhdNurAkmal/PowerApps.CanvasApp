ComponentDefinitions:
  cmpClock:
    DefinitionType: CanvasComponent
    CustomProperties:
      bgColor:
        PropertyKind: Input
        DisplayName: bgColor
        Description: A custom property
        DataType: Color
        Default: =RGBA(0, 0, 0, 1)
      iconSVG:
        PropertyKind: Input
        DisplayName: iconSVG
        Description: A custom property
        DataType: Text
        Default: ="Text"
      lblDateColor:
        PropertyKind: Input
        DisplayName: lblDateColor
        Description: A custom property
        DataType: Color
        Default: =RGBA(0, 0, 0, 1)
      lblTimeColor:
        PropertyKind: Input
        DisplayName: lblTimeColor
        Description: A custom property
        DataType: Color
        Default: =RGBA(0, 0, 0, 1)
    Properties:
      Fill: =RGBA(255, 255, 255, 0)
      Height: =167
      OnReset: =Set(varNow, Now())
      Width: =500
    Children:
      - tmrClock:
          Control: Timer@2.1.0
          Properties:
            AutoStart: =true
            BorderColor: =ColorFade(Self.Fill, -15%)
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =ColorFade(Self.BorderColor, 70%)
            DisabledColor: =ColorFade(Self.Fill, 90%)
            DisabledFill: =ColorFade(Self.Fill, 70%)
            Duration: =1000
            Fill: =RGBA(56, 96, 178, 1)
            Font: =Font.'Open Sans'
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: =ColorFade(RGBA(56, 96, 178, 1), -20%)
            OnTimerEnd: =Set(varNow, Now())
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =Self.Color
            Repeat: =true
            Visible: =false
            X: =62
            Y: =300
      - ctrCard:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            Fill: =cmpClock.bgColor
            Height: =Parent.Height
            PaddingBottom: =5
            PaddingLeft: =5
            PaddingRight: =5
            PaddingTop: =5
            RadiusBottomLeft: =25
            RadiusBottomRight: =25
            RadiusTopLeft: =25
            RadiusTopRight: =25
            Width: =Parent.Width
          Children:
            - lblTime:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =cmpClock.lblTimeColor
                  Font: =Font.Lato
                  FontWeight: =FontWeight.Bold
                  Height: =86
                  Size: =40
                  Text: =Text(varNow, "HH:mm:ss")
                  Width: =232
                  X: =28
                  Y: =48
            - lblDate:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =cmpClock.lblDateColor
                  Fill: =RGBA(0,0,0,0)
                  Font: =Font.Lato
                  FontWeight: =FontWeight.Bold
                  Height: =49
                  Size: =16
                  Text: =Text(varNow, "dddd, dd mmmm yyyy")
                  Width: =286
                  X: =3
                  Y: =18
            - SVG_12:
                Control: Image@2.2.3
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 1)
                  Height: =90
                  Image: ="data:image/svg+xml;utf8," & EncodeUrl(cmpClock.iconSVG)
                  Width: =93
                  X: =326
                  Y: =29
