ComponentDefinitions:
  FORM:
    DefinitionType: CanvasComponent
    CustomProperties:
      Data:
        PropertyKind: Input
        DisplayName: Data
        Description: A custom property
        DataType: Text
        Default: ="Text"
      Label:
        PropertyKind: Input
        DisplayName: Label
        Description: A custom property
        DataType: Text
        Default: ="Text"
    Properties:
      Height: =100
      Width: =If(App.Width < 640, App.Width, App.Width * 0.4)
    Children:
      - Container38:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Height: =FORM.Height
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutDirection: =LayoutDirection.Vertical
            PaddingBottom: =8
            PaddingLeft: =8
            PaddingRight: =8
            PaddingTop: =8
            Width: =FORM.Width
          Children:
            - Container39:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutMinHeight: =16
                  LayoutMinWidth: =16
                  PaddingBottom: =8
                  PaddingLeft: =8
                  PaddingRight: =8
                  PaddingTop: =8
                Children:
                  - Text8:
                      Control: ModernText@1.0.0
                      Properties:
                        AutoHeight: =true
                        BorderStyle: =BorderStyle.None
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        Size: =18
                        Text: =FORM.Label
                  - Text9:
                      Control: ModernText@1.0.0
                      Properties:
                        AutoHeight: =true
                        Font: =Font.Lato
                        FontWeight: =FontWeight.Semibold
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        Size: =18
                        Text: =":"
                        Width: =20
                  - Text8_1:
                      Control: ModernText@1.0.0
                      Properties:
                        AutoHeight: =true
                        FillPortions: =1
                        Font: =Font.Lato
                        FontWeight: =FontWeight.Lighter
                        Height: =35
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        Size: =20
                        Text: =If(!IsBlank(FORM.Data), FORM.Data, "")
