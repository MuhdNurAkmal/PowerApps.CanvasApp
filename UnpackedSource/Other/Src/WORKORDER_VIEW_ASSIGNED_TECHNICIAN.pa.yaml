                  - btnAdd:
                      Control: Button@0.0.45
                      Properties:
                        Appearance: ='ButtonCanvas.Appearance'.Primary
                        BasePaletteColor: =RGBA(110,110,225,1)
                        BorderRadius: =35
                        DisplayMode: =If (varSelectedWorkOrder.dmp_status.Value <> "CLS", DisplayMode.Edit, DisplayMode.Disabled)
                        Font: =Font.'Lato Black'
                        FontSize: =18
                        Height: =45
                        Icon: ="Add"
                        IconStyle: ='ButtonCanvas.IconStyle'.Filled
                        OnSelect: |-
                          =// Snapshot members locally (one read, breaks delegation drag)
                          ClearCollect(
                              colMembers,
                              Filter(tbl_team_member, team.Id = ddTeam.Selected.ID)
                          );

                          ClearCollect(
                              colExistingAssign,
                              Filter(
                                  tbl_mrl_workorder_assign,
                                  maintenanceorder_no = varSelectedWorkOrder.maintenanceorder_no
                              )
                          );

                          If(
                              !IsBlank(ddTeam.Selected.ID),

                              // Build the full record set in memory first...
                              ClearCollect(
                                  colToPatch,
                                  ForAll(
                                      colMembers As CurrentMember,
                                      With(
                                          {
                                              existingRecord: LookUp(
                                                  colExistingAssign,
                                                  technician_id = CurrentMember.technician.Id
                                              )
                                          },
                                          Patch(
                                              Coalesce(existingRecord, Defaults(tbl_mrl_workorder_assign)),
                                              {
                                                  maintenanceorder_no: varSelectedWorkOrder.maintenanceorder_no,
                                                  technician_id: CurrentMember.technician.Id,
                                                  team: {
                                                      Id: CurrentMember.team.Id,
                                                      Value: CurrentMember.team.Value
                                                  },
                                                  status: If(
                                                      !IsBlank(existingRecord),
                                                      existingRecord.status,
                                                      If(
                                                          varSelectedWorkOrder.dmp_status.Value = "ASG",
                                                          { Id: 2, Value: "New" },
                                                          { Id: Blank(), Value: Blank() }
                                                      )
                                                  )
                                              }
                                          )
                                      )
                                  )
                              );

                              // ...then one batched Patch to the data source
                              Patch(tbl_mrl_workorder_assign, colToPatch);

                              Patch(
                                  tbl_log,
                                  Defaults(tbl_log),
                                  {
                                      action: "Team Assignment",
                                      log_category: { ID: Blank(), Value: "Work Order Log" },
                                      workorder_no_ref: varSelectedWorkOrder.maintenanceorder_no,
                                      performed_by: User().FullName,
                                      user_email: User().Email,
                                      user_role: varUserRecord.role.Value,
                                      details: "Engineer assigned " & ddTeam.Selected.team_name & " to work order.",
                                      dept_name: Text(varUserRecord.department.Value),
                                      location_lat: Location.Latitude,
                                      location_long: Location.Longitude,
                                      log_timestamp: Now()
                                  }
                              );

                              Notify("Added members from " & ddTeam.Selected.team_name, NotificationType.Success),

                              Notify("Please choose team from dropdown", NotificationType.Error)
                          )
