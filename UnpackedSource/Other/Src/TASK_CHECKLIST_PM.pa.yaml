                  - btnSubmitPM:
                      Control: ModernButton@1.0.0
                      Properties:
                        Align: =Align.Center
                        BasePaletteColor: =RGBA(110, 110, 225, 1)
                        FontWeight: =""
                        Height: =50
                        OnSelect: |-
                          =/* stable code on 9/7/2026

                          //////////////////////////////////////////////////////////////////////////////////////////
                          // Update checklist form (response) and update Technician Status to submitted

                          Patch(
                              tbl_mrl_workorder_assign,
                              LookUp( tbl_mrl_workorder_assign, ID = varSelectedTask.ID ),
                              {
                                  response: varChecklistOutput,
                                  status: {
                                      Id:5, 
                                      Value:"Submitted"
                                  },
                                  end_date: Now()
                              }
                          );

                          // log tbl_mrl_workorder_assign_log status Processing
                          Patch(
                              tbl_mrl_workorder_assign_log,
                              Defaults(tbl_mrl_workorder_assign_log),
                              {
                                  workorder_assign_id: varSelectedTask.ID,
                                  maintenanceorder_no: varSelectedTask.maintenanceorder_no,
                                  maintenanceorder_status: "Submitted",
                                  user_email: varUserRecord.email,
                                  user_role: varUserRecord.role.Value,
                                  user_department: varUserRecord.department.Value,
                                  location_longitude: Location.Longitude,
                                  location_latitude: Location.Latitude
                              }
                          );






                          //////////////////////////////////////////////////////////////////////////////////////////
                          // Update response to tbl_mrl_workorder 
                          // Conflict-Free Merging Logic (Bypasses Table/ParseJSON errors)

                          // 1. Initialize and clear the collection to define schema
                          ClearCollect(colFinalMerged, {Key: "", Val: ""});
                          Clear(colFinalMerged);

                          // Load all relevant responses into a local collection to avoid delegation issues
                          ClearCollect(colRawResponses, 
                              Filter(tbl_mrl_workorder_assign, maintenanceorder_no = varSelectedTask.maintenanceorder_no && !IsBlank(response))
                          );


                          // 2. Loop through all rows for this specific WorkOrder
                          ForAll(
                              colRawResponses,
                              With({
                                  // Remove curly braces and escaping backslashes that cause parsing errors
                                  cleanBody: Substitute(Substitute(Substitute(Substitute(response, "{", ""), "}", ""), "\", ""), """", "")
                              },
                              ForAll(
                                  Split(cleanBody, ","),
                                  With({
                                      // Separate Key and Value (e.g., "1.1.a.ECA1:true")
                                      rawKey: Trim(First(Split(Value, ":")).Value),
                                      rawVal: Trim(Last(Split(Value, ":")).Value)
                                  },
                                  If(!IsBlank(rawKey),
                                      // Remove existing key to prevent duplicates (Conflict Resolution)
                                      RemoveIf(colFinalMerged, Key = rawKey);
                                      Collect(colFinalMerged, { Key: rawKey, Val: rawVal })
                                  )
                              ))
                          ));


                          // 4. Create the final clean JSON string
                          UpdateContext({
                              varMasterJson: "{" & Concat(colFinalMerged, $"""{Key}"":{Val}", ",") & "}"
                          });


                          // 5. Patch to the Master Table (tbl_mrl_workorder)
                          Patch(
                              tbl_maintenance_order,
                              LookUp(tbl_maintenance_order, maintenanceorder_no = varSelectedTask.maintenanceorder_no), 
                              {
                                  completed_responses:  JSON(
                                      varMasterJson, 
                                      JSONFormat.IgnoreBinaryData
                                  )
                              }
                          );


                          UpdateContext({
                              isPopUpTechConfirmClose : false
                          });
                          Notify("Task Successfully Submitted");
                          Navigate(TASK_LIST);

                          end of stable code on 9/7/2026*/

                          //////////////////////////////////////////////////////////////////////////////////////////
                          // PM SUBMIT — offline-capable
                          // Online: patch response + Submitted + log, then merge all technicians'
                          //         JSONs into tbl_maintenance_order.completed_responses
                          // Offline: queue payload; assign patch + log + merge replayed at sync

                          // Step 1: capture payload as plain values (before any Reset/Navigate)
                          Set(varPMPayload, {
                              assign_id: varSelectedTask.ID,
                              maintenanceorder_no: varSelectedTask.maintenanceorder_no,
                              response_json: varChecklistOutput,
                              user_email: varUserRecord.email,
                              user_role: varUserRecord.role.Value,
                              user_department: varUserRecord.department.Value,
                              submitted_at: Now(),
                              location_longitude: Location.Longitude,
                              location_latitude: Location.Latitude
                          });

                          // Step 2: online → patch directly; offline → queue
                          If(
                              !varIsOffline && Connection.Connected,

                              // ================= ONLINE =================
                              // response + Technician status → Submitted
                              Patch(
                                  tbl_mrl_workorder_assign,
                                  LookUp(tbl_mrl_workorder_assign, ID = varPMPayload.assign_id),
                                  {
                                      response: varPMPayload.response_json,
                                      status: { Id: 5, Value: "Submitted" },
                                      end_date: varPMPayload.submitted_at
                                  }
                              );

                              // log Submitted
                              Patch(
                                  tbl_mrl_workorder_assign_log,
                                  Defaults(tbl_mrl_workorder_assign_log),
                                  {
                                      workorder_assign_id: varPMPayload.assign_id,
                                      maintenanceorder_no: varPMPayload.maintenanceorder_no,
                                      maintenanceorder_status: "Submitted",
                                      user_email: varPMPayload.user_email,
                                      user_role: varPMPayload.user_role,
                                      user_department: varPMPayload.user_department,
                                      location_longitude: varPMPayload.location_longitude,
                                      location_latitude: varPMPayload.location_latitude
                                  }
                              );

                              // merge all technicians' JSONs → completed_responses
                              MergeResponsesToMO(varPMPayload.maintenanceorder_no);

                              // keep local collection in step so TASK_LIST shows Submitted
                              Patch(
                                  colTblMrlWorkorderAssign,
                                  LookUp(colTblMrlWorkorderAssign, ID = varPMPayload.assign_id),
                                  {
                                      response: varPMPayload.response_json,
                                      status: { Id: 5, Value: "Submitted" },
                                      end_date: varPMPayload.submitted_at
                                  }
                              )
                              ,

                              // ================= OFFLINE =================
                              // queue for sync (flush replays assign patch + log + merge)
                              Collect(colPendingSubmissionsPM, varPMPayload);
                              IfError(SaveData(colPendingSubmissionsPM, "colPendingSubmissionsPMCache"), Blank());

                              // optimistic local update — merge deferred to sync
                              Patch(
                                  colTblMrlWorkorderAssign,
                                  LookUp(colTblMrlWorkorderAssign, ID = varPMPayload.assign_id),
                                  {
                                      response: varPMPayload.response_json,
                                      status: { Id: 5, Value: "Submitted" },
                                      end_date: varPMPayload.submitted_at
                                  }
                              );
                              IfError(SaveData(colTblMrlWorkorderAssign, "colTblMrlWorkorderAssignCache"), Blank())
                          );

                          // ===== Cleanup (shared) =====
                          UpdateContext({ isPopUpTechConfirmClose: false });
                          Notify(
                              If(!varIsOffline && Connection.Connected,
                                  "Task Successfully Submitted",
                                  "Saved offline — will sync when connection returns"
                              ),
                              If(!varIsOffline && Connection.Connected, NotificationType.Success, NotificationType.Warning)
                          );
                          Navigate(TASK_LIST);
                        PaddingBottom: =5
                        PaddingLeft: =12
