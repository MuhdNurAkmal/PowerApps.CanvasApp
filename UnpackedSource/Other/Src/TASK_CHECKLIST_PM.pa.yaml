    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnHidden: |-
        =UpdateContext({
            varSelectedTemplate: Blank(),
            varWorkOrder: Blank(),
            varCurrentRecord: Blank(),
            varChecklistPMDialog: false,
            varIsDataReady: false
        });

        UpdateContext({ isPopUpTechConfirmClose : false });
        UpdateContext({ isPopUpEngConfirmClose : false });
      OnVisible: "=/* Stable code on 9/7/2026\n// Reset state first\nUpdateContext({\n    varSelectedTemplate: Blank(),\n    varCurrentRecord: Blank(),\n    varWorkOrder: Blank(),\n    varData: Blank()\n});\n\nUpdateContext({ varIsDataReady: false });\n\n///////////////////////////////////////////////\n// Init - based on user role\n\nSwitch(\n    varUserRecord.role.Value,\n    \"Technician\", \n    \n        ////////////////////////////////////\n        // If Technician\n\n        // get workorder\n        UpdateContext({\n            varWorkOrder: LookUp(tbl_maintenance_order, maintenanceorder_no = varSelectedTask.maintenanceorder_no)\n        });\n\n        // get template \n        UpdateContext({\n            varCurrentRecord: LookUp(ref_template, ID = varWorkOrder.form_template.Id)\n        });\n\n        // Validate template existence\n        If(\n            IsBlank(varCurrentRecord) || IsBlank(varCurrentRecord.TemplateJson),\n            // TEMPLATE MISSING\n            Notify(\"Template missing or Template JSON is empty for this Work Order.\", NotificationType.Error),\n            UpdateContext({varSelectedTemplate: varCurrentRecord.TemplateJson});\n        );\n\n        // set response to collection\n        Set(\n            varChecklistOutput,\n            If(\n                IsBlank(LookUp(tbl_mrl_workorder_assign, ID = varSelectedTask.ID, response)),\n                Blank(),\n                LookUp(tbl_mrl_workorder_assign, ID = varSelectedTask.ID, response)\n            )\n        );,\n\n\n    \"Engineer\", \n        ////////////////////////////////////\n        // If Engineer\n\n        // get template\n        UpdateContext({\n            varData: LookUp(tbl_maintenance_order, maintenanceorder_no = varSelectedWorkOrder.maintenanceorder_no)\n        });\n\n        // get template \n        UpdateContext({\n            varCurrentRecord: LookUp(ref_template, ID = varData.form_template.Id)\n        });\n    \n        // Validate template existence\n        If(\n            IsBlank(varCurrentRecord) || IsBlank(varCurrentRecord.TemplateJson),\n            // TEMPLATE MISSING\n            Notify(\"Template missing or Template JSON is empty for this Work Order.\", NotificationType.Error),\n            UpdateContext({varSelectedTemplate: varCurrentRecord.TemplateJson});\n        );\n\n\n        \n        If(\n            !IsBlank(workorderAssignId),\n            // workorderAssignId is not blank\n            Set(\n                varChecklistOutput,\n                If(\n                    IsBlank(LookUp(tbl_mrl_workorder_assign, ID = workorderAssignId, response)),\n                    Blank(),\n                    LookUp(tbl_mrl_workorder_assign, ID = workorderAssignId, response)\n                )\n            );,\n\n            // workorderAssignId blank\n            // set response to collection\n            Set(\n                varChecklistOutput,\n                If(\n                    IsBlank(varData.completed_responses),\n                    Blank(),\n                    varData.completed_responses\n                )\n            );\n        );,\n\n    \"Maintainer Scheduler\", \n        ////////////////////////////////////\n        // If Maintainer Scheduler\n\n        // get template\n        UpdateContext({\n            varData: LookUp(tbl_maintenance_order, maintenanceorder_no = varSelectedWorkOrderMS.maintenanceorder_no)\n        });\n\n        // get template \n        UpdateContext({\n            varCurrentRecord: LookUp(ref_template, ID = varData.form_template.Id)\n        });\n    \n        // Validate template existence\n        If(\n            IsBlank(varCurrentRecord) || IsBlank(varCurrentRecord.TemplateJson),\n            // TEMPLATE MISSING\n            Notify(\"Template missing or Template JSON is empty for this Work Order.\", NotificationType.Error),\n            UpdateContext({varSelectedTemplate: varCurrentRecord.TemplateJson});\n        );\n        \n        If(\n            !IsBlank(workorderAssignId),\n            // workorderAssignId is not blank\n            Set(\n                varChecklistOutput,\n                If(\n                    IsBlank(LookUp(tbl_mrl_workorder_assign, ID = workorderAssignId, response)),\n                    Blank(),\n                    LookUp(tbl_mrl_workorder_assign, ID = workorderAssignId, response)\n                )\n            );,\n\n            // workorderAssignId blank\n            // set response to collection\n            Set(\n                varChecklistOutput,\n                If(\n                    IsBlank(varData.completed_responses),\n                    Blank(),\n                    varData.completed_responses\n                )\n            );\n        );,\n\n\n    \"Supervisor\",\n        ////////////////////////////////////\n        // If Supervisor\n\n        // get template\n        UpdateContext({\n            varData: LookUp(tbl_maintenance_order, maintenanceorder_no = varSelectedWorkOrderSV.maintenanceorder_no)\n        });\n\n        // get template \n        UpdateContext({\n            varCurrentRecord: LookUp(ref_template, ID = varData.form_template.Id)\n        });\n    \n        // Validate template existence\n        If(\n            IsBlank(varCurrentRecord) || IsBlank(varCurrentRecord.TemplateJson),\n            // TEMPLATE MISSING\n            Notify(\"Template missing or Template JSON is empty for this Work Order.\", NotificationType.Error),\n            UpdateContext({varSelectedTemplate: varCurrentRecord.TemplateJson});\n        );\n\n\n        \n        If(\n            !IsBlank(workorderAssignId),\n            // workorderAssignId is not blank\n            Set(\n                varChecklistOutput,\n                If(\n                    IsBlank(LookUp(tbl_mrl_workorder_assign, ID = workorderAssignId, response)),\n                    Blank(),\n                    LookUp(tbl_mrl_workorder_assign, ID = workorderAssignId, response)\n                )\n            );,\n\n            // workorderAssignId blank\n            // set response to collection\n            Set(\n                varChecklistOutput,\n                If(\n                    IsBlank(varData.completed_responses),\n                    Blank(),\n                    varData.completed_responses\n                )\n            );\n        );,\n    \"\"            \n);\n\n\nUpdateContext({ varIsDataReady: true });\n\nend of stable code 9/7/2026 */\n\n// Reset state first\n\n\nUpdateContext({\n    varSelectedTemplate: Blank(),\n    varCurrentRecord: Blank(),\n    varWorkOrder: Blank(),\n    varData: Blank()\n});\n\nUpdateContext({ varIsDataReady: false });\n\n///////////////////////////////////////////////\n// Init - based on user role\n\nSwitch(\n    varUserRecord.role.Value,\n    \"Technician\",\n\n        ////////////////////////////////////\n        // If Technician — offline-capable: reads from cached collections\n\n        // get workorder (cached — works both modes)\n        UpdateContext({\n            varWorkOrder: LookUp(colTblMaintenanceOrder, maintenanceorder_no = varSelectedTask.maintenanceorder_no)\n        });\n\n        // get template (cached — works both modes)\n        UpdateContext({\n            varCurrentRecord: LookUp(colRefTemplate, ID = varWorkOrder.form_template.Id)\n        });\n\n        // Validate template existence\n        If(\n            IsBlank(varCurrentRecord) || IsBlank(varCurrentRecord.TemplateJson),\n            // TEMPLATE MISSING\n            Notify(\"Template missing or Template JSON is empty for this Work Order.\", NotificationType.Error),\n            UpdateContext({varSelectedTemplate: varCurrentRecord.TemplateJson});\n        );\n\n        // set response — from local collection (has any offline-submitted response too)\n        Set(\n            varChecklistOutput,\n            LookUp(colTblMrlWorkorderAssign, ID = varSelectedTask.ID, response)\n        );,\n\n\n    \"Engineer\",\n        ////////////////////////////////////\n        // If Engineer (online-only role — connector reads unchanged)\n\n        UpdateContext({\n            varData: LookUp(tbl_maintenance_order, maintenanceorder_no = varSelectedWorkOrder.maintenanceorder_no)\n        });\n\n        UpdateContext({\n            varCurrentRecord: LookUp(ref_template, ID = varData.form_template.Id)\n        });\n\n        If(\n            IsBlank(varCurrentRecord) || IsBlank(varCurrentRecord.TemplateJson),\n            Notify(\"Template missing or Template JSON is empty for this Work Order.\", NotificationType.Error),\n            UpdateContext({varSelectedTemplate: varCurrentRecord.TemplateJson});\n        );\n\n        If(\n            !IsBlank(workorderAssignId),\n            Set(\n                varChecklistOutput,\n                LookUp(tbl_mrl_workorder_assign, ID = workorderAssignId, response)\n            );,\n            Set(\n                varChecklistOutput,\n                varData.completed_responses\n            );\n        );,\n\n    \"Maintainer Scheduler\",\n        ////////////////////////////////////\n        // If Maintainer Scheduler (online-only role)\n\n        UpdateContext({\n            varData: LookUp(tbl_maintenance_order, maintenanceorder_no = varSelectedWorkOrderMS.maintenanceorder_no)\n        });\n\n        UpdateContext({\n            varCurrentRecord: LookUp(ref_template, ID = varData.form_template.Id)\n        });\n\n        If(\n            IsBlank(varCurrentRecord) || IsBlank(varCurrentRecord.TemplateJson),\n            Notify(\"Template missing or Template JSON is empty for this Work Order.\", NotificationType.Error),\n            UpdateContext({varSelectedTemplate: varCurrentRecord.TemplateJson});\n        );\n\n        If(\n            !IsBlank(workorderAssignId),\n            Set(\n                varChecklistOutput,\n                LookUp(tbl_mrl_workorder_assign, ID = workorderAssignId, response)\n            );,\n            Set(\n                varChecklistOutput,\n                varData.completed_responses\n            );\n        );,\n\n\n    \"Supervisor\",\n        ////////////////////////////////////\n        // If Supervisor (online-only role)\n\n        UpdateContext({\n            varData: LookUp(tbl_maintenance_order, maintenanceorder_no = varSelectedWorkOrderSV.maintenanceorder_no)\n        });\n\n        UpdateContext({\n            varCurrentRecord: LookUp(ref_template, ID = varData.form_template.Id)\n        });\n\n        If(\n            IsBlank(varCurrentRecord) || IsBlank(varCurrentRecord.TemplateJson),\n            Notify(\"Template missing or Template JSON is empty for this Work Order.\", NotificationType.Error),\n            UpdateContext({varSelectedTemplate: varCurrentRecord.TemplateJson});\n        );\n\n        If(\n            !IsBlank(workorderAssignId),\n            Set(\n                varChecklistOutput,\n                LookUp(tbl_mrl_workorder_assign, ID = workorderAssignId, response)\n            );,\n            Set(\n                varChecklistOutput,\n                varData.completed_responses\n            );\n        );,\n    \"\"\n);\n\n\nUpdateContext({ varIsDataReady: true });"
