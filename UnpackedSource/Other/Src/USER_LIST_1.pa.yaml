                  IconStyle: ='ButtonCanvas.IconStyle'.Filled
                  OnSelect: "=// 1. Check if mandatory fields are filled\nIf(\n    IsBlank(txtEmail_1.Value) || IsBlank(ddRoles_1.Selected) || IsBlank(ddDepartments_1.Selected),\n    \n    // IF INVALID: Show warning\n    Notify(\"Please fill in all mandatory fields (Email, Role, and Department).\", NotificationType.Warning);\n    UpdateContext({isPopupConfirm: false});,\n\n    // IF VALID: Proceed with Patch\n    UpdateContext({ varIsLoading: true }); // Optional: trigger your spinning icon\n    \n    IfError(\n        Patch(\n            tbl_mrl_users,\n            Defaults(tbl_mrl_users),\n            {\n                email: Trim(txtEmail_1.Value),\n                // Staff ID is patched only if not blank, otherwise sends blank\n                mrl_employee_id: If(!IsBlank(txtStaffID_1.Value), Trim(txtStaffID_1.Value), Blank()),\n                role: { \n                    Id: ddRoles_1.Selected.ID, \n                    Value: ddRoles_1.Selected.role_name \n                },\n                department: { \n                    Id: ddDepartments_1.Selected.ID, \n                    Value: ddDepartments_1.Selected.Department_Code \n                },\n                status: { \n                    Id: 1, \n                    Value: \"Active\" \n                }\n            }\n        ),\n        \n        // Error Handling\n        Notify(\"Error: Could not create user. The email might already exist.\", NotificationType.Error),\n        \n        // Success Actions\n        Notify(\"User account '\" & varTempuserName & \"' created successfully.\", NotificationType.Success);\n        \n        // Clean up UI\n        Reset(txtEmail_1);\n        Reset(txtName_1);\n        Reset(txtStaffID_1);\n        Reset(ddRoles_1);\n        Reset(ddDepartments_1);\n\n        UpdateContext({\n            isPopupNewUser: false,\n            isPopupConfirm: false,\n            varTempuserName: Blank(),\n            varIsLoading: false\n        })\n    )\n)"
                  Text: ="Register"
                  VerticalAlign: =VerticalAlign.Middle
