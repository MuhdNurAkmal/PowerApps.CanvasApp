                  - ButtonCanvas1_7:
                      Control: ModernButton@1.0.0
                      Properties:
                        Align: =Align.Center
                        BasePaletteColor: =RGBA(110, 110, 225, 1)
                        FontWeight: =""
                        Height: =50
                        OnSelect: "=/* stable version 07/07/2026\n// 1. Save full failure report to the dedicated CM table\nPatch(\n    tbl_response_cm,\n    Defaults(tbl_response_cm),\n    {\n          \n        maintenanceorder_no: varSelectedWorkOrder.maintenanceorder_no,\n        \n        station_name: {\n            Id: ddStation.Selected.ID,\n            Value: ddStation.Selected.station_name\n        },\n        system: {\n            Id: LookUp(ref_system, system_name = ddSystem.Selected.Value).ID,\n            Value: ddSystem.Selected.Value\n        },\n        subsystem: {\n            Id: LookUp(ref_subsystem, subsystem_name = ddSubSystem.Selected.Value).ID,\n            Value: ddSubSystem.Selected.Value\n        }, \n        sub_subsystem: {\n            Id: LookUp(ref_sub_subsystem, sub_subsystem_name = ddSubSubSystem.Selected.Value).ID,\n            Value: ddSubSubSystem.Selected.Value\n        },\n        root_cause: {\n            Id: LookUp(ref_root_cause, root_cause_name = ddRootCause.Selected.Value).ID,\n            Value: ddRootCause.Selected.Value\n        },\n        plan_start_date: dtPlanStartDate.SelectedDate, \n        plan_end_date: dtPlanEndDate.SelectedDate,\n        remarks: txtRemark.Text,\n        train_no: If(varUserRecord.department.Value = \"RSDM\",\n            { Id: ddTrainNo.Selected.ID, Value: ddTrainNo.Selected.train_no },\n            Blank()\n        ),\n        car_position: If(varUserRecord.department.Value = \"RSDM\",\n            { Id: ddCarPosition.Selected.ID, Value: ddCarPosition.Selected.car_position },\n            Blank()\n        )\n    }\n);\n\n// 2. Update Technician Assignment Status to \"Submitted\"\nPatch(\n    tbl_mrl_workorder_assign,\n    LookUp(tbl_mrl_workorder_assign, ID = varSelectedTask.ID),\n    {\n        status: { Id: 5, Value: \"Submitted\" },\n        end_date: Now()\n    }\n);\n\n// 3. Log the status in the Log table\nPatch(\n    tbl_mrl_workorder_assign_log,\n    Defaults(tbl_mrl_workorder_assign_log),\n    {\n        workorder_assign_id: varSelectedTask.ID,\n        maintenanceorder_no: varSelectedTask.maintenanceorder_no,\n        maintenanceorder_status: \"Submitted\",\n        user_email: varUserRecord.email,\n        user_role: varUserRecord.role.Value,\n        user_department: varUserRecord.department.Value,\n        location_longitude: Location.Longitude,\n        location_latitude: Location.Latitude\n    }\n);\n\n// 4. Update ONLY the Remark in the Master Table (tbl_mrl_workorder)\nPatch(\n    tbl_maintenance_order,\n    LookUp(tbl_maintenance_order, maintenanceorder_no = varSelectedTask.maintenanceorder_no),\n    {\n        remarks: txtRemark.Text \n    }\n);\n\n// 5. Cleanup and Navigation\nReset(ddSystem);\nReset(ddSubSystem);\nReset(ddSubSubSystem);\nReset(ddRootCause);\nReset(ddStation);\nReset(txtRemark);\nReset(dtPlanStartDate);\nReset(dtPlanEndDate);\n\nSet(varIsNewEntry, false); \n\nUpdateContext({\n    isPopUpCMTechConfirmClose : false\n});\n\n\nNotify(\"Task Successfully Submitted\", NotificationType.Success);\nNavigate(TASK_LIST);\n\nend stable version 07/07/2026\n*/\n\n// ============================================================\n// Step 1: Capture payload as plain values (before any Reset)\n// ============================================================\nSet(varCMPayload, {\n    maintenanceorder_no: varSelectedTask.maintenanceorder_no,\n    station_id: ddStation.Selected.ID,\n    station_value: ddStation.Selected.station_name,\n    system_id: LookUp(colRefSystem, system_name = ddSystem.Selected.Value).ID,\n    system_value: ddSystem.Selected.Value,\n    subsystem_id: LookUp(colRefSubsystem, subsystem_name = ddSubSystem.Selected.Value).ID,\n    subsystem_value: ddSubSystem.Selected.Value,\n    sub_subsystem_id: LookUp(colRefSubSubsystem, sub_subsystem_name = ddSubSubSystem.Selected.Value).ID,\n    sub_subsystem_value: ddSubSubSystem.Selected.Value,\n    root_cause_id: LookUp(colRefRootCause, root_cause_name = ddRootCause.Selected.Value).ID,\n    root_cause_value: ddRootCause.Selected.Value,\n    plan_start_date: dtPlanStartDate.SelectedDate,\n    plan_end_date: dtPlanEndDate.SelectedDate,\n    remarks: txtRemark.Text,\n    is_rsdm: varUserRecord.department.Value = \"RSDM\",\n    train_no_id: If(varUserRecord.department.Value = \"RSDM\", ddTrainNo.Selected.ID),\n    train_no_value: If(varUserRecord.department.Value = \"RSDM\", ddTrainNo.Selected.train_no),\n    car_position_id: If(varUserRecord.department.Value = \"RSDM\", ddCarPosition.Selected.ID),\n    car_position_value: If(varUserRecord.department.Value = \"RSDM\", ddCarPosition.Selected.car_position),\n    assign_id: varSelectedTask.ID,\n    assign_mo_no: varSelectedTask.maintenanceorder_no,\n    user_email: varUserRecord.email,\n    user_role: varUserRecord.role.Value,\n    user_department: varUserRecord.department.Value,\n    submitted_at: Now(),\n    location_longitude: Location.Longitude,\n    location_latitude: Location.Latitude\n});\n\n// ============================================================\n// Step 2: Online → patch directly. Offline → queue.\n// ============================================================\nIf(\n    Connection.Connected && !varIsOffline,\n\n    // ===== ONLINE: your existing 4 patches, but reading from varCMPayload =====\n    Patch(tbl_response_cm, Defaults(tbl_response_cm), {\n        maintenanceorder_no: varCMPayload.maintenanceorder_no,\n        station_name: { Id: varCMPayload.station_id, Value: varCMPayload.station_value },\n        system: { Id: varCMPayload.system_id, Value: varCMPayload.system_value },\n        subsystem: { Id: varCMPayload.subsystem_id, Value: varCMPayload.subsystem_value },\n        sub_subsystem: { Id: varCMPayload.sub_subsystem_id, Value: varCMPayload.sub_subsystem_value },\n        root_cause: { Id: varCMPayload.root_cause_id, Value: varCMPayload.root_cause_value },\n        plan_start_date: varCMPayload.plan_start_date,\n        plan_end_date: varCMPayload.plan_end_date,\n        remarks: varCMPayload.remarks,\n        train_no: If(varCMPayload.is_rsdm, { Id: varCMPayload.train_no_id, Value: varCMPayload.train_no_value }, Blank()),\n        car_position: If(varCMPayload.is_rsdm, { Id: varCMPayload.car_position_id, Value: varCMPayload.car_position_value }, Blank())\n    });\n\n    Patch(tbl_mrl_workorder_assign,\n        LookUp(tbl_mrl_workorder_assign, ID = varCMPayload.assign_id),\n        { status: { Id: 5, Value: \"Submitted\" }, end_date: varCMPayload.submitted_at }\n    );\n\n    Patch(tbl_mrl_workorder_assign_log, Defaults(tbl_mrl_workorder_assign_log), {\n        workorder_assign_id: varCMPayload.assign_id,\n        maintenanceorder_no: varCMPayload.assign_mo_no,\n        maintenanceorder_status: \"Submitted\",\n        user_email: varCMPayload.user_email,\n        user_role: varCMPayload.user_role,\n        user_department: varCMPayload.user_department,\n        location_longitude: varCMPayload.location_longitude,\n        location_latitude: varCMPayload.location_latitude\n    });\n    \n    Patch(tbl_maintenance_order,\n        LookUp(tbl_maintenance_order, maintenanceorder_no = varCMPayload.assign_mo_no),\n        { remarks: varCMPayload.remarks }\n    ),\n\n    // ===== OFFLINE: queue it =====\n    Collect(colPendingSubmissions, varCMPayload);\n    IfError(SaveData(colPendingSubmissions, \"colPendingSubmissionsCache\"), Blank());\n\n    // Optimistic local update so TASK_LIST shows it as Submitted\n    Patch(colTblMrlWorkorderAssign,\n        LookUp(colTblMrlWorkorderAssign, ID = varCMPayload.assign_id),\n        { status: { Id: 5, Value: \"Submitted\" }, end_date: varCMPayload.submitted_at }\n    );\n    IfError(SaveData(colTblMrlWorkorderAssign, \"colTblMrlWorkorderAssignCache\"), Blank())\n);\n\n// ===== Cleanup (shared) =====\nReset(ddSystem); Reset(ddSubSystem); Reset(ddSubSubSystem);\nReset(ddRootCause); Reset(ddStation); Reset(txtRemark);\nReset(dtPlanStartDate); Reset(dtPlanEndDate);\nSet(varIsNewEntry, false);\nUpdateContext({ isPopUpCMTechConfirmClose: false });\nNotify(\n    If(Connection.Connected && !varIsOffline,\n        \"Task Successfully Submitted\",\n        \"Saved offline — will sync when connection returns\"\n    ),\n    If(Connection.Connected && !varIsOffline, NotificationType.Success, NotificationType.Warning)\n);\nNavigate(TASK_LIST);"
                        PaddingBottom: =5
