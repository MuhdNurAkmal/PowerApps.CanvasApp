                      Control: Button@0.0.45
                      Properties:
                        BasePaletteColor: =RGBA(110, 110, 225, 1)
                        BorderRadius: =35
                        BorderStyle: =BorderStyle.Solid
                        BorderThickness: =2
                        DisplayMode: |-
                          =//DisplayMode.Edit

                          If(varSelectedTask.status.Value = "Submitted" || varSelectedTask.status.Value = "Closed", DisplayMode.Disabled, DisplayMode.Edit)
                        FontColor: =RGBA(255, 255, 255, 1)
                        FontSize: =18
                        Height: =50
                        Icon: =
                        IconStyle: ='ButtonCanvas.IconStyle'.Filled
                        OnSelect: |-
                          =
                          Patch(
                              tbl_maintenance_order,
                              LookUp(tbl_maintenance_order, maintenanceorder_no = varSelectedWorkOrderMS.maintenanceorder_no),
                              {
                                  dmp_status: {
                                      Id: 5,
                                      Value: "CLS"
                                  }
                              }
                          );

                          Patch(
                              tbl_mrl_workorder_log,
                              Defaults(tbl_mrl_workorder_log),
                              {
                                  maintenanceorder_no: varSelectedWorkOrderMS.maintenanceorder_no,
                                  maintenanceorder_status: "CLS",
                                  user_email: varUserRecord.email,
                                  user_role: varUserRecord.role.Value,
                                  user_department: varUserRecord.department.Value,
                                  location_longitude: Location.Longitude,
                                  location_latitude: Location.Latitude
                              }
                          );

                          // Loop through and Update each Assignment + Log each assignment
                          // Snapshot the rows (breaks same-source dependency)
                          ClearCollect(
                              colToCloseMS,
                              Filter(
                                  tbl_mrl_workorder_assign,
                                  maintenanceorder_no = varSelectedWorkOrderMS.maintenanceorder_no
                              )
                          );

                          ForAll(
                              colToCloseMS As CurrentAssign,
                              With(
                                  {
                                      UpdatedAssign: Patch(
                                          tbl_mrl_workorder_assign,
                                          CurrentAssign,
                                          {
                                              status: { Id: 6, Value: "Closed" }
                                          }
                                      )
                                  },
                                  Patch(
                                      tbl_mrl_workorder_assign_log,
                                      Defaults(tbl_mrl_workorder_assign_log),
                                      {
                                          workorder_assign_id: UpdatedAssign.ID,
                                          maintenanceorder_no: varSelectedWorkOrderMS.maintenanceorder_no,
                                          maintenanceorder_status: "Closed",
                                          user_email: varUserRecord.email,
                                          user_department: varUserRecord.department.Value,
                                          user_role: varUserRecord.role.Value,
                                          location_longitude: Location.Longitude,
                                          location_latitude: Location.Latitude
                                      }
                                  )
                              )
                          );

                          UpdateContext({isWvamsPopupConfirmCloseWo:false});

                          Notify("Successfully Close Work Order", NotificationType.Success);
                          Navigate(WORKORDER_LIST,ScreenTransition.Fade);
                        Text: ="Submit"
                        VerticalAlign: =VerticalAlign.Middle
                        Width: =325
                        X: =197
                        Y: =321
