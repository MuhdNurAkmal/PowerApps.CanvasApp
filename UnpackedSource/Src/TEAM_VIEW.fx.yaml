                                    tbl_mrl_workorder_assign,
                                    technician.Id = ThisRecord.technician_id && 
                                    status.Value <> "Closed"
                                )
                            )
                        )
                    );
                    
                    // 2. Decision Logic
                    If(
                        CountRows(colBlockingMembers) > 0,
                    
                        // Blocked: Show names of technicians who aren't finished
                        Notify(
                            "Deletion Blocked. Active tasks for: " & Concat(colBlockingMembers, technician.Value, ", "),
                            NotificationType.Error
                        ),
                    
                        // Success: Delete assignments and the team
                        Remove(
                            tbl_team,
                            LookUp( tbl_team, ID = varSelectedTeam.ID)
                        );
                    
                        Notify("Successfully Deleted Team", NotificationType.Success);
                    
                        UpdateContext({
                            isPopupViewTeamConfirmDeleteTeam: false,
                            varIsLoading: false
                        });
                        
                        Back();
                    )
