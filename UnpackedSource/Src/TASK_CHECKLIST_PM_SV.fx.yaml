TASK_CHECKLIST_PM_SV As screen:
    OnHidden: |-
        =UpdateContext({
            varSelectedTemplate: Blank(),
            varCurrentRecord: Blank(),
            varChecklistPMDialog: false,
            varIsDataReady: false
        });
        
        UpdateContext({ isPopUpTechConfirmClose : false });
        UpdateContext({ isPopUpEngConfirmClose : false });
    OnVisible: |-
        =// Reset state first
        UpdateContext({
            varSelectedTemplate: Blank(),
            varCurrentRecord: Blank(),
            varData: Blank(),
        
            isTcpsPopupConfirmRevise: false, 
            isTcpsPopupConfirmVerify: false,
            isWvatsPopupReviseRemark: false
        });
        
        UpdateContext({ varIsDataReady: false });
        
        ///////////////////////////////////////////////
        // Init - based on user role
        
        Switch(
            varUserRecord.role.Value,
            
            "Engineer", 
                ////////////////////////////////////
                // If Engineer
        
                // get template
                UpdateContext({
                    varData: LookUp(tbl_maintenance_order, maintenanceorder_no = varSelectedWorkOrder.maintenanceorder_no)
                });
        
                // get template 
                UpdateContext({
                    varCurrentRecord: LookUp(ref_template, ID = varData.form_template.Id)
                });
            
                // Validate template existence
                If(
                    IsBlank(varCurrentRecord) || IsBlank(varCurrentRecord.TemplateJson),
                    // TEMPLATE MISSING
                    Notify("Template missing or Template JSON is empty for this Work Order.", NotificationType.Error),
                    UpdateContext({varSelectedTemplate: varCurrentRecord.TemplateJson});
                );
        
                If(
                    !IsBlank(workorderAssignId),
                    // workorderAssignId is not blank
                    Set(
                        varChecklistOutput,
                        If(
                            IsBlank(LookUp(tbl_mrl_workorder_assign, ID = workorderAssignId, response)),
                            Blank(),
                            LookUp(tbl_mrl_workorder_assign, ID = workorderAssignId, response)
                        )
                    );,
        
                    // workorderAssignId blank
                    // set response to collection
                    Set(
                        varChecklistOutput,
                        If(
                            IsBlank(varData.completed_responses),
                            Blank(),
                            varData.completed_responses
                        )
                    );
                );,
        
        
            "Supervisor",
                ////////////////////////////////////
                // If Supervisor
        
                // get template
                UpdateContext({
                    varData: LookUp(tbl_maintenance_order, maintenanceorder_no = varSelectedWorkOrderSV.maintenanceorder_no)
                });
        
                // get template 
                UpdateContext({
                    varCurrentRecord: LookUp(ref_template, ID = varData.form_template.Id)
                });
            
                // Validate template existence
                If(
                    IsBlank(varCurrentRecord) || IsBlank(varCurrentRecord.TemplateJson),
                    // TEMPLATE MISSING
                    Notify("Template missing or Template JSON is empty for this Work Order.", NotificationType.Error),
                    UpdateContext({varSelectedTemplate: varCurrentRecord.TemplateJson});
                );
        
        
                
                If(
                    !IsBlank(workorderAssignId),
                    // workorderAssignId is not blank
                    Set(
                        varChecklistOutput,
                        If(
                            IsBlank(LookUp(tbl_mrl_workorder_assign, ID = workorderAssignId, response)),
                            Blank(),
                            LookUp(tbl_mrl_workorder_assign, ID = workorderAssignId, response)
                        )
                    );,
        
                    // workorderAssignId blank
                    // set response to collection
                    Set(
                        varChecklistOutput,
                        If(
                            IsBlank(varData.completed_responses),
                            Blank(),
                            varData.completed_responses
                        )
                    );
                );,
            ""            
        );
        
        
        UpdateContext({ varIsDataReady: true });

