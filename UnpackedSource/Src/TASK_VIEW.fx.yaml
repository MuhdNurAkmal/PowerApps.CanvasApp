TASK_VIEW As screen:
    OnHidden: |-
        =UpdateContext({isPopupChecklist: false});
    OnVisible: |
        =If(
            !varIsOffline,
            // ONLINE: load live + cache
            ClearCollect(
                colTblMrlWorkorderAssign,
                Filter(
                    tbl_workorder_assign,
                    technician_id = varUserRecord.ID
                )
            );
            IfError(
                SaveData(
                    colTblMrlWorkorderAssign,
                    "colTblMrlWorkorderAssignCache"
                ),
                Blank()
            );
            UpdateContext({isPopupChecklist: false});
            ,
            // OFFLINE: load from cache (Clear first — LoadData appends!)
            Clear(colTblMrlWorkorderAssign);
            IfError(
                LoadData(
                    colTblMrlWorkorderAssign,
                    "colTblMrlWorkorderAssignCache",
                    true
                ),
                Blank()
