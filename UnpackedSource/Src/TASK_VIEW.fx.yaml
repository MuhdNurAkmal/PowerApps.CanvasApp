                Height: =50
                Icon: ="ArrowRight"
                IconStyle: =IconStyle.Filled
                Layout: =ButtonLayout.IconAfter
                OnSelect: |-
                    =Set(varViewPMOnly, true);
                    Set(varIsNewEntry, true);
                    Set(previousScreen,TASK_VIEW);
                    
                    /* stable code 08/07/2026
                    // Change status new to processing
                    Patch(
                        tbl_workorder_assign,
                        LookUp(tbl_workorder_assign, ID = varSelectedTask.ID && start_date = Blank()),
                        {
                            status: {
                                Id: 4,
                                Value: "Processing"
                            },
                            start_date: Now()
                        }
                    );
                    
                    
                    // log tbl_workorder_assign_log status Processing
                    Patch(
                        tbl_workorder_assign_log,
                        // 1. Try to find an existing record with these two values
                        Coalesce(
                            LookUp(
                                tbl_workorder_assign_log, workorder_assign_id = varSelectedTask.ID && maintenanceorder_status = "Processing"
                            ),
                            // 2. If LookUp is blank, create a new record instead
                            Defaults(tbl_workorder_assign_log)
                        ),
                        {
                            workorder_assign_id: varSelectedTask.ID,
                            maintenanceorder_no: varSelectedTask.maintenanceorder_no,
                            maintenanceorder_status: "Processing",
                            user_email: varUserRecord.email,
                            user_role: varUserRecord.role.Value,
                            user_department: varUserRecord.department.Value,
                            location_longitude: Location.Longitude,
                            location_latitude: Location.Latitude
                        }
                    );
                    
                    
                    Switch(
                        LookUp(
                            tbl_maintenance_order,
                            maintenanceorder_no = varSelectedTask.maintenanceorder_no,
                            maintenance_type.Value
                        ),
                        "YPM1", Navigate(TASK_CHECKLIST_PM, ScreenTransition.Fade),
                        "YCM1", Navigate(TASK_CHECKLIST_CM, ScreenTransition.Fade)
                    );
                    stable code 08/07/2026 */
                    
                    If(
                        !varIsOffline,
                    
                        // ================= ONLINE =================
                        With(
                            { rec: LookUp(tbl_workorder_assign, ID = varSelectedTask.ID) },
                            If(
                                !IsBlank(rec) && IsBlank(rec.start_date),
                                Patch(
                                    tbl_workorder_assign,
                                    rec,
                                    {
                                        status: { Id: 4, Value: "Processing" },
                                        start_date: Now()
                                    }
                                );
                                Patch(
                                    tbl_workorder_assign_log,
                                    Coalesce(
                                        LookUp(
                                            tbl_workorder_assign_log,
                                            workorder_assign_id = varSelectedTask.ID && maintenanceorder_status = "Processing"
                                        ),
                                        Defaults(tbl_workorder_assign_log)
                                    ),
                                    {
                                        workorder_assign_id: varSelectedTask.ID,
                                        maintenanceorder_no: varSelectedTask.maintenanceorder_no,
                                        maintenanceorder_status: "Processing",
                                        user_email: varUserRecord.email,
                                        user_role: varUserRecord.role.Value,
                                        user_department: varUserRecord.department.Value,
                                        location_longitude: Location.Longitude,
                                        location_latitude: Location.Latitude
                                    }
                                )
                            )
                        );
                    
                        // keep local collection in step so UI is consistent
                        Patch(
                            colTblMrlWorkorderAssign,
                            LookUp(colTblMrlWorkorderAssign, ID = varSelectedTask.ID),
                            {
                                status: { Id: 4, Value: "Processing" },
                                start_date: Now()
                            }
                        )
                        ,
                    
                        // ================= OFFLINE =================
                        Collect(
                            colPendingStatusUpdates,
                            {
                                queue_id: GUID(),
                                queued_at: Now(),
                                workorder_assign_id: varSelectedTask.ID,
                                maintenanceorder_no: varSelectedTask.maintenanceorder_no,
                                new_status: "Processing",
                                start_date: Now(),
                                user_email: varUserRecord.email,
                                user_role: varUserRecord.role.Value,
                                user_department: varUserRecord.department.Value,
                                location_longitude: Location.Longitude,
                                location_latitude: Location.Latitude
                            }
                        );
                        IfError(SaveData(colPendingStatusUpdates, "colPendingStatusUpdatesCache"), Blank());
                    
                        Patch(
                            colTblMrlWorkorderAssign,
                            LookUp(colTblMrlWorkorderAssign, ID = varSelectedTask.ID),
                            {
                                status: { Id: 4, Value: "Processing" },
                                start_date: Now()
                            }
                        );
                        IfError(SaveData(colTblMrlWorkorderAssign, "colTblMrlWorkorderAssignCache"), Blank())
                    );
                    
                    // navigate using CACHED parent list — works both modes
                    Switch(
                        LookUp(
                            colTblMaintenanceOrder,
                            maintenanceorder_no = varSelectedTask.maintenanceorder_no,
                            maintenance_type.Value
                        ),
                        "YPM1", Navigate(TASK_CHECKLIST_PM, ScreenTransition.Fade),
