        //Reset(drpCarPosition);
        
        
        
        
        If(
            !varIsOffline,
        
            // ONLINE: load live + cache
            ClearCollect(
                colTblMrlWorkorderAssign,
                Filter(tbl_mrl_workorder_assign, technician_id = varUserRecord.ID)
            );
            IfError(SaveData(colTblMrlWorkorderAssign, "colTblMrlWorkorderAssignCache"), Blank());
            
            
            If(
                varIsNewEntry,
                // This clears the dropdowns only when starting new maintenance
                Reset(ddStation);
                Reset(ddSystem);
                Reset(ddSubSystem);
                Reset(ddSubSubSystem);
                Reset(ddRootCause);
                Reset(txtRemark);
                Reset(dtPlanStartDate);
                Reset(dtPlanEndDate);
                
                // Clear RSDM specific fields
                If(varUserRecord.department.Value = "RSDM", 
                    Reset(ddTrainNo); 
                    Reset(ddCarPosition)
                )
            )
            ,
        
            // OFFLINE: load from cache (Clear first — LoadData appends!)
            Clear(colTblMrlWorkorderAssign);
            IfError(LoadData(colTblMrlWorkorderAssign, "colTblMrlWorkorderAssignCache", true), Blank())
        );

