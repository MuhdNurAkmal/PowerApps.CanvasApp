                    icoRefresh_3 As icon:
                        Color: =RGBA(166, 166, 166, 1)
                        DisplayMode: =If(varIsLoading, DisplayMode.Disabled, DisplayMode.Edit)
                        Height: =30
                        Icon: =Icon.Reload
                        OnSelect: |-
                            =If(
                                !varIsOffline && Connection.Connected,
                            
                                // ===== ONLINE REFRESH =====
                                UpdateContext({varIsLoading: true});
                            
                                Refresh(tbl_mrl_workorder_assign);
                                Refresh(tbl_maintenance_order);
                            
                                // reload collections (screens read these, not the connector)
                                ClearCollect(
                                    colTblMrlWorkorderAssign,
                                    Filter(tbl_mrl_workorder_assign, technician_id = varUserRecord.ID)
                                );
                            
                                Clear(colTblMaintenanceOrder);
                                ForAll(
                                    Distinct(colTblMrlWorkorderAssign, maintenanceorder_no) As mo,
                                    With(
                                        { rec: LookUp(tbl_maintenance_order, maintenanceorder_no = mo.Value) },
                                        If(!IsBlank(rec), Collect(colTblMaintenanceOrder, rec))
                                    )
                                );
                            
                                // re-cache
                                IfError(SaveData(colTblMrlWorkorderAssign, "colTblMrlWorkorderAssignCache"), Blank());
                                IfError(SaveData(colTblMaintenanceOrder, "colTblMaintenanceOrderCache"), Blank());
                            
                                UpdateContext({varIsLoading: false});
                                Notify("Data Refreshed", NotificationType.Success)
                                ,
                            
                                // ===== OFFLINE: nothing to refresh =====
                                Notify("Offline — showing cached data", NotificationType.Warning)
                            );
