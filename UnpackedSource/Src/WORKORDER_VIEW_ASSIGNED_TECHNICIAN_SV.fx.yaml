        =Set(varTab,1);
        
        UpdateContext({
            isWvatsPopupLog : false,
            isWvatsPopupConfirmSubmit : false,
            isWvatsPopupReviseRemark : false
        });
        
        // 1. Start the loading state
        UpdateContext({varIsLoading: true});
        
