                    =// Update work order to closed work order
                    Patch(
                        tbl_maintenance_order,
                        LookUp(tbl_maintenance_order,ID = varSelectedWorkOrder.ID),
                        {
                            dmp_status: {
                                Id: 5,Value: "CLS"
                            },
                            remarks: txtChecklistRemarks.Value
                        }
                    );
                    
                    // log tbl_mrl_workorder_log status ASG
                    Patch(
                        tbl_mrl_workorder_log,
                        Defaults(tbl_mrl_workorder_log),
                        {
                            maintenanceorder_no: varSelectedWorkOrder.maintenanceorder_no,
                            maintenanceorder_status: "CLS",
                            user_email: varUserRecord.email ,
                            user_role: varUserRecord.role.Value,
                            user_department: varUserRecord.department.Value,
                            location_longitude: Location.Longitude,
                            location_latitude: Location.Latitude
                        }
                    );
                    
                    /*
                    // Update work order assign to closed
                    ForAll(
                        Filter(tbl_mrl_workorder_assign, maintenanceorder_no = varSelectedWorkOrder.maintenanceorder_no),
                        Patch(
                            tbl_mrl_workorder_assign,
                            ThisRecord,
                            {
                                status: { Id: 6 , Value: "Closed" }
                            }
                        );
                    
                        // log tbl_mrl_workorder_assign_log status Processing
                        Patch(
                            tbl_mrl_workorder_assign_log,
                            Defaults(tbl_mrl_workorder_assign_log),
                            {
                                workorder_assign_id: ThisRecord.ID,
                                maintenanceorder_no: Round(varSelectedWorkOrder.maintenanceorder_no,0),
                                workorder_status: "Closed",
                                user_email: varUserRecord.email,
                                user_role: varUserRecord.role.Value,
                                user_department: varUserRecord.department.Value,
                                location_long: Location.Longitude,
                                location_lat: Location.Latitude
                            }
                        );
                    
                    );*/
                    
                    // Snapshot the rows (breaks same-source dependency)
                    ClearCollect(
                        colToClose,
                        Filter(
                            tbl_mrl_workorder_assign,
                            maintenanceorder_no = varSelectedWorkOrder.maintenanceorder_no
                        )
                    );
                    
                    // Update work order assign to closed + log each
                    ForAll(
                        colToClose As CurrentAssign,
                        With(
                            {
                                UpdatedAssign:
                                Patch(
                                    tbl_mrl_workorder_assign,
                                    CurrentAssign,
                                    {
                                        status: { Id: 6, Value: "Closed" }
                                    }
                                )
                            },
                            Patch(
                                tbl_mrl_workorder_assign_log,
                                Defaults(tbl_mrl_workorder_assign_log),
                                {
                                    workorder_assign_id: UpdatedAssign.ID,
                                    maintenanceorder_no: Round(varSelectedWorkOrder.maintenanceorder_no, 0),
                                    maintenanceorder_status: "Closed",
                                    user_email: varUserRecord.email,
                                    user_role: varUserRecord.role.Value,
                                    user_department: varUserRecord.department.Value,
                                    location_longitude: Location.Longitude,
                                    location_latitude: Location.Latitude
                                }
                            )
                        )
                    );
                    
                    UpdateContext({ isPopUpEngConfirmClose: false});
                    
                    Navigate(WORKORDER_LIST,ScreenTransition.Fade);
                    
                    
