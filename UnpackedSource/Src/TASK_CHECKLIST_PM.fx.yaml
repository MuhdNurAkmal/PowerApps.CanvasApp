        // Reset state first
        
        
        UpdateContext({
            varSelectedTemplate: Blank(),
            varCurrentRecord: Blank(),
            varWorkOrder: Blank(),
            varData: Blank()
        });
        
        UpdateContext({ varIsDataReady: false });
        
        ///////////////////////////////////////////////
        // Init - based on user role
        
        Switch(
            varUserRecord.role.Value,
            "Technician",
        
                ////////////////////////////////////
                // If Technician — offline-capable: reads from cached collections
        
                // get workorder (cached — works both modes)
                UpdateContext({
                    varWorkOrder: LookUp(colTblMaintenanceOrder, maintenanceorder_no = varSelectedTask.maintenanceorder_no)
                });
        
                // get template (cached — works both modes)
                UpdateContext({
                    varCurrentRecord: LookUp(colRefTemplate, ID = varWorkOrder.form_template.Id)
                });
        
                // Validate template existence
                If(
                    IsBlank(varCurrentRecord) || IsBlank(varCurrentRecord.TemplateJson),
                    // TEMPLATE MISSING
                    Notify("Template missing or Template JSON is empty for this Work Order.", NotificationType.Error),
                    UpdateContext({varSelectedTemplate: varCurrentRecord.TemplateJson});
                );
        
                // set response — from local collection (has any offline-submitted response too)
                Set(
                    varChecklistOutput,
                    LookUp(colTblMrlWorkorderAssign, ID = varSelectedTask.ID, response)
                );,
        
        
            "Engineer",
                ////////////////////////////////////
                // If Engineer (online-only role — connector reads unchanged)
        
                UpdateContext({
                    varData: LookUp(tbl_maintenance_order, maintenanceorder_no = varSelectedWorkOrder.maintenanceorder_no)
                });
        
                UpdateContext({
                    varCurrentRecord: LookUp(ref_template, ID = varData.form_template.Id)
                });
        
                If(
                    IsBlank(varCurrentRecord) || IsBlank(varCurrentRecord.TemplateJson),
                    Notify("Template missing or Template JSON is empty for this Work Order.", NotificationType.Error),
                    UpdateContext({varSelectedTemplate: varCurrentRecord.TemplateJson});
                );
        
                If(
                    !IsBlank(workorderAssignId),
                    Set(
                        varChecklistOutput,
                        LookUp(tbl_mrl_workorder_assign, ID = workorderAssignId, response)
                    );,
                    Set(
                        varChecklistOutput,
                        varData.completed_responses
                    );
                );,
        
            "Maintainer Scheduler",
                ////////////////////////////////////
                // If Maintainer Scheduler (online-only role)
        
                UpdateContext({
                    varData: LookUp(tbl_maintenance_order, maintenanceorder_no = varSelectedWorkOrderMS.maintenanceorder_no)
                });
        
                UpdateContext({
                    varCurrentRecord: LookUp(ref_template, ID = varData.form_template.Id)
                });
        
                If(
                    IsBlank(varCurrentRecord) || IsBlank(varCurrentRecord.TemplateJson),
                    Notify("Template missing or Template JSON is empty for this Work Order.", NotificationType.Error),
                    UpdateContext({varSelectedTemplate: varCurrentRecord.TemplateJson});
                );
        
                If(
                    !IsBlank(workorderAssignId),
                    Set(
                        varChecklistOutput,
                        LookUp(tbl_mrl_workorder_assign, ID = workorderAssignId, response)
                    );,
                    Set(
                        varChecklistOutput,
                        varData.completed_responses
                    );
                );,
        
        
            "Supervisor",
                ////////////////////////////////////
                // If Supervisor (online-only role)
        
                UpdateContext({
                    varData: LookUp(tbl_maintenance_order, maintenanceorder_no = varSelectedWorkOrderSV.maintenanceorder_no)
                });
        
                UpdateContext({
                    varCurrentRecord: LookUp(ref_template, ID = varData.form_template.Id)
                });
        
