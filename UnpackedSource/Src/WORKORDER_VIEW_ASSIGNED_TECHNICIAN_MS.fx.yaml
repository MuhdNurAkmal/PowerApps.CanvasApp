                                    location_longitude: Location.Longitude,
                                    location_latitude: Location.Latitude
                                }
                            )
                        )
                    );
                    
                    UpdateContext({isWvamsPopupConfirmCloseWo:false});
                    
                    Notify("Successfully Close Work Order", NotificationType.Success);
                    Navigate(WORKORDER_LIST,ScreenTransition.Fade);
